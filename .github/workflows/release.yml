name: Release Build

on:
  push:
    tags:
      - 'v*'  # 当推送版本标签时触发

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        echo "🔨 Building NETKit-Py executable..."
        echo "Current directory: $(pwd)"
        echo "Files in current directory:"
        ls -la
        echo "Files in scripts directory:"
        ls -la scripts/
        echo "Running PyInstaller..."
        pyinstaller scripts/netkit_onefile.spec
        
    - name: Verify build
      run: |
        if (Test-Path "dist/NETKit-Py.exe") {
          $fileSize = (Get-Item "dist/NETKit-Py.exe").Length / 1MB
          Write-Host "✅ Build successful! File size: $([math]::Round($fileSize, 1)) MB"
        } else {
          Write-Host "❌ Build failed!"
          exit 1
        }
      shell: powershell
      
    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"
        $releaseBody = @"
        ## 🚀 NETKit-Py Release $tag
        
        ### 📦 下载
        - **NETKit-Py.exe** - 单文件可执行程序 (约16MB)
        
        ### 🔧 使用说明
        1. 下载 NETKit-Py.exe 文件
        2. 右键选择"以管理员身份运行"
        3. 开始使用网络工具功能
        
        ### ⚠️ 系统要求
        - Windows 10/11
        - 管理员权限（推荐）
        
        ### 📋 功能特性
        - IP地址快速切换
        - Ping测试工具
        - 子网计算器
        - 路由追踪
        - 静态路由管理
        
        ---
        
        **自动构建时间**: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
        **构建版本**: ${{ github.sha }}
        "@
        
        # 创建Release并上传文件
        gh release create $tag dist/NETKit-Py.exe --title "NETKit-Py $tag" --notes $releaseBody
        
        # 上传使用说明文档
        if (Test-Path "docs/使用说明_单文件版本.md") {
          gh release upload $tag "docs/使用说明_单文件版本.md" --clobber
        }
      shell: powershell 